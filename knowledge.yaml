id: vili
name: Vili
version: 0.1.0
description: |
  Go-based testing tool for live integration tests against running services.
  Validates that deployed microservices respond correctly to real requests, used
  for production smoke testing in Cantara deployments.
units:
  - id: test-runner
    name: Test Runner
    type: component
    description: Live test execution engine — orchestrates test cases and collects pass/fail results.
  - id: http-tests
    name: HTTP Tests
    type: component
    description: HTTP endpoint test cases — sends real requests and asserts on response status and body.
  - id: reporter
    name: Reporter
    type: component
    description: Test result reporting — outputs structured results for CI consumption and human review.
